name: first-workflow
on: push
jobs:
  job-one:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: install dependencies
        run: npm ci
      - name: lint
        run: npm lint
      - name: test
        run: npm test
      - name: deploy
        run: npm build

